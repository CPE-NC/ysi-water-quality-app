<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YSI Water Quality Logger</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d9e1ec;
      --text: #1b2a3a;
      --muted: #5c6b7a;
      --accent: #1264a3;
      --accent2: #0f7b6c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 14px;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.03);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 5px;
    }
    input, select, button, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      background: #fff;
    }
    input[readonly] {
      background: #f9fbfd;
    }
    button {
      font-weight: 700;
      color: white;
      background: var(--accent);
      border: none;
    }
    button.secondary { background: var(--accent2); }
    button.ghost {
      background: #eef4fa;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .preview {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #eef3f8;
    }
    .muted {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
    }
    .status {
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 8px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f3f7fb; }
    .small { font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>YSI Water Quality Logger</h1>

    <div class="card">
      <div class="grid">
        <div>
          <label for="site">Site</label>
          <select id="site"></select>
        </div>
        <div>
          <label for="depthSelect">Depth</label>
          <select id="depthSelect">
            <option value="0.1">0.1 ft</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div id="customDepthWrap" style="display:none;">
          <label for="customDepth">Custom Depth (ft)</label>
          <input id="customDepth" inputmode="decimal" placeholder="Enter depth in ft" />
        </div>
        <div>
          <label for="date">Date (MM/DD/YY)</label>
          <input id="date" />
        </div>
        <div>
          <label for="time">Time</label>
          <input id="time" />
        </div>
      </div>
    </div>

    <div class="card">
      <label for="photo">YSI Photo</label>
      <input id="photo" type="file" accept="image/*" capture="environment" />
      <img id="preview" class="preview" alt="YSI preview" />
      <p class="muted">Take the photo as square and close to the data screen as possible. After OCR runs, review every value before saving.</p>
      <div class="actions">
        <button id="ocrBtn" type="button">Run OCR on selected photo</button>
        <button id="clearBtn" type="button" class="ghost">Clear Form</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Parsed values</h3>
      <div class="grid">
        <div><label for="temp">Temp.</label><input id="temp" inputmode="decimal" /></div>
        <div><label for="cond">Cond.</label><input id="cond" inputmode="decimal" /></div>
        <div><label for="salinity">Salinity</label><input id="salinity" inputmode="decimal" /></div>
        <div><label for="doMg">DO mg/L</label><input id="doMg" inputmode="decimal" /></div>
        <div><label for="doPct">DO%</label><input id="doPct" inputmode="decimal" /></div>
        <div><label for="ph">pH</label><input id="ph" inputmode="decimal" /></div>
        <div><label for="turb">Turb</label><input id="turb" inputmode="decimal" /></div>
      </div>
      <div class="actions">
        <button id="saveBtn" type="button" class="secondary">Save Reading</button>
        <button id="exportBtn" type="button">Export Excel</button>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Raw OCR text</h3>
      <textarea id="rawText" spellcheck="false"></textarea>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">Saved readings</h3>
      <div class="actions" style="grid-template-columns: 1fr 1fr 1fr;">
        <button id="reloadBtn" type="button" class="ghost">Reload Saved</button>
        <button id="deleteLastBtn" type="button" class="ghost">Delete Last</button>
        <button id="resetAllBtn" type="button" class="ghost">Delete All</button>
      </div>
      <div id="tableWrap"></div>
    </div>
  </div>

<script>
const SITE_OPTIONS = [
  "BC-CBR","FC-13","FC-4","FC-6","FC-FOY","IC-HS","IC-SID","LC-RR","MOT-CBR","MOT-ND",
  "PC-BDDS","PC-BDUS","PC-M","PG-CH","PG-ML","PG-NC","SC-CD","SC-CH","SC-GR","SC-NK"
].sort();

const STORAGE_KEY = 'ysiWaterQualityReadingsV4';
let currentImageDataUrl = '';
let savedReadings = [];

const el = id => document.getElementById(id);

function setStatus(msg) { el('status').textContent = msg || ''; }

function formatDateMMDDYY(d) {
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

function formatTime12(d) {
  let hrs = d.getHours();
  const mins = String(d.getMinutes()).padStart(2, '0');
  const secs = String(d.getSeconds()).padStart(2, '0');
  const ampm = hrs >= 12 ? 'PM' : 'AM';
  hrs = hrs % 12 || 12;
  return `${hrs}:${mins}:${secs} ${ampm}`;
}

function populateSites() {
  el('site').innerHTML = SITE_OPTIONS.map(s => `<option value="${s}">${s}</option>`).join('');
}

function setTodayDefaults() {
  const now = new Date();
  if (!el('date').value) el('date').value = formatDateMMDDYY(now);
  if (!el('time').value) el('time').value = formatTime12(now);
}

function currentDepth() {
  return el('depthSelect').value === 'custom' ? el('customDepth').value.trim() : el('depthSelect').value;
}

function toggleDepth() {
  el('customDepthWrap').style.display = el('depthSelect').value === 'custom' ? 'block' : 'none';
}

function clearParsedValues(keepMeta = true) {
  ['temp','cond','salinity','doMg','doPct','ph','turb','rawText'].forEach(id => el(id).value = '');
  if (!keepMeta) {
    el('customDepth').value = '';
    el('depthSelect').value = '0.1';
    toggleDepth();
    el('site').selectedIndex = 0;
    el('date').value = '';
    el('time').value = '';
    setTodayDefaults();
  }
}

function normalizeText(text) {
  return text
    .replace(/[|]/g, '1')
    .replace(/[Oo](?=\s*%)/g, '0')
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/\r/g, '\n');
}

function firstMatch(text, patterns) {
  for (const pattern of patterns) {
    const m = text.match(pattern);
    if (m && m[1]) return m[1];
  }
  return '';
}

function fallbackNumbers(text) {
  const nums = [];
  const regex = /\b\d{1,4}(?:\.\d{1,3})?\b/g;
  let m;
  while ((m = regex.exec(text)) !== null) nums.push(m[0]);
  return nums;
}

function parseYSIText(raw) {
  const text = normalizeText(raw);

  const parsed = {
    date: '',
    time: '',
    temp: firstMatch(text, [/(\d{1,3}\.\d)\s*°?\s*C/i]),
    cond: firstMatch(text, [/(\d{1,5}(?:\.\d+)?)\s*(?:uS|µS|US)\s*\/?\s*cm/i, /(\d{1,5}(?:\.\d+)?)\s*SPC/i]),
    salinity: firstMatch(text, [/(\d{1,3}\.\d{1,3})\s*SAL/i, /(\d{1,3}\.\d{1,3})\s*ppt/i]),
    doMg: firstMatch(text, [/(\d{1,2}\.\d{1,3})\s*DO\s*mg/i, /(\d{1,2}\.\d{1,3})\s*mg\s*\/?\s*L/i]),
    doPct: firstMatch(text, [/(\d{1,3}\.\d)\s*DO\s*%/i, /(\d{1,3}\.\d)\s*%/i]),
    ph: firstMatch(text, [/(\d{1,2}\.\d{1,3})\s*pH/i]),
    turb: firstMatch(text, [/(\d{1,4}\.\d{1,3})\s*NTU/i])
  };

  const dt = text.match(/(\d{2}\/\d{2}\/\d{2}).{0,20}?(\d{1,2}:\d{2}:\d{2}\s*[AP]M?)/is);
  if (dt) {
    parsed.date = dt[1];
    parsed.time = dt[2].replace(/\s+/g, ' ').trim().replace(/([AP])$/, '$1M');
  }

  // Ordered fallback for your YSI screen layout:
  // temp, pressure(ignore), DO%, DO mg/L, cond, salinity, pH, turb, depth(ignore)
  const nums = fallbackNumbers(text);
  if (!parsed.temp && nums[0]) parsed.temp = nums[0];
  if (!parsed.doPct && nums[2]) parsed.doPct = nums[2];
  if (!parsed.doMg && nums[3]) parsed.doMg = nums[3];
  if (!parsed.cond && nums[4]) parsed.cond = nums[4];
  if (!parsed.salinity && nums[5]) parsed.salinity = nums[5];
  if (!parsed.ph && nums[6]) parsed.ph = nums[6];
  if (!parsed.turb && nums[7]) parsed.turb = nums[7];

  return parsed;
}

function scoreParsed(p) {
  return ['temp','cond','salinity','doMg','doPct','ph','turb'].filter(k => !!p[k]).length;
}

async function imageToVariants(imgEl) {
  const variants = [];
  const img = await loadImageElement(imgEl.src);

  // full image
  variants.push(renderVariant(img, 0, 0, img.width, img.height, false));
  // center crop where screen usually is
  variants.push(renderVariant(img, img.width * 0.18, img.height * 0.08, img.width * 0.64, img.height * 0.82, false));
  // thresholded center crop
  variants.push(renderVariant(img, img.width * 0.18, img.height * 0.08, img.width * 0.64, img.height * 0.82, true));
  return variants;
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = src;
  });
}

function renderVariant(img, sx, sy, sw, sh, threshold = false) {
  const canvas = document.createElement('canvas');
  canvas.width = Math.max(1, Math.round(sw));
  canvas.height = Math.max(1, Math.round(sh));
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

  if (threshold) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
      const v = gray > 150 ? 255 : 0;
      d[i] = d[i + 1] = d[i + 2] = v;
    }
    ctx.putImageData(imageData, 0, 0);
  }
  return canvas.toDataURL('image/png');
}

async function runOCR() {
  if (!currentImageDataUrl) {
    alert('Please select a photo first.');
    return;
  }

  setStatus('Running OCR. This can take several seconds on iPhone.');
  el('rawText').value = '';

  try {
    const variants = await imageToVariants(el('preview'));
    let bestText = '';
    let bestParsed = null;
    let bestScore = -1;

    for (let i = 0; i < variants.length; i++) {
      const { data } = await Tesseract.recognize(variants[i], 'eng', {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round((m.progress || 0) * 100);
            setStatus(`Running OCR ${pct}%`);
          }
        }
      });
      const parsed = parseYSIText(data.text || '');
      const score = scoreParsed(parsed);
      if (score > bestScore) {
        bestScore = score;
        bestText = data.text || '';
        bestParsed = parsed;
      }
    }

    el('rawText').value = bestText;
    applyParsed(bestParsed || {});
    setStatus(bestScore > 0 ? `OCR finished. Parsed ${bestScore} fields.` : 'OCR finished, but no YSI values were confidently parsed. You can still edit fields manually.');
  } catch (err) {
    console.error(err);
    setStatus('OCR failed. Try a straighter, closer photo with less glare.');
    alert('OCR failed.');
  }
}

function applyParsed(parsed) {
  if (parsed.date) el('date').value = parsed.date;
  if (parsed.time) el('time').value = parsed.time;
  if (parsed.temp) el('temp').value = parsed.temp;
  if (parsed.cond) el('cond').value = parsed.cond;
  if (parsed.salinity) el('salinity').value = parsed.salinity;
  if (parsed.doMg) el('doMg').value = parsed.doMg;
  if (parsed.doPct) el('doPct').value = parsed.doPct;
  if (parsed.ph) el('ph').value = parsed.ph;
  if (parsed.turb) el('turb').value = parsed.turb;
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(savedReadings));
}

function loadFromStorage() {
  try {
    savedReadings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch {
    savedReadings = [];
  }
  renderTable();
}

function buildReading() {
  return {
    Date: el('date').value.trim() || formatDateMMDDYY(new Date()),
    Personnel1: '',
    Personnel2: '',
    Weather: '',
    Rain: '',
    Creek: '',
    Site: el('site').value,
    Time: el('time').value.trim() || formatTime12(new Date()),
    Depth: currentDepth(),
    'Temp.': el('temp').value.trim(),
    'Cond.': el('cond').value.trim(),
    Salinity: el('salinity').value.trim(),
    'DO mg/L': el('doMg').value.trim(),
    'DO%': el('doPct').value.trim(),
    pH: el('ph').value.trim(),
    Turb: el('turb').value.trim(),
    'Entero.': '',
    'Chl-A': ''
  };
}

function saveReading() {
  const depth = currentDepth();
  if (!el('site').value) {
    alert('Please choose a site.');
    return;
  }
  if (!depth) {
    alert('Please choose 0.1 ft or enter a custom depth.');
    return;
  }
  const reading = buildReading();
  savedReadings.push(reading);
  saveToStorage();
  renderTable();
  setStatus('Reading saved.');
}

function renderTable() {
  const wrap = el('tableWrap');
  if (!savedReadings.length) {
    wrap.innerHTML = '<p class="muted">No readings saved yet.</p>';
    return;
  }
  const cols = ['Date','Site','Time','Depth','Temp.','Cond.','Salinity','DO mg/L','DO%','pH','Turb'];
  let html = '<table><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
  savedReadings.forEach(r => {
    html += '<tr>' + cols.map(c => `<td>${r[c] || ''}</td>`).join('') + '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function exportExcel() {
  if (!savedReadings.length) {
    alert('No readings have been saved yet.');
    return;
  }
  const rows = savedReadings.map(r => ({
    Date: r.Date,
    Personnel: '',
    Personnel_2: '',
    Weather: '',
    Rain: '',
    Creek: '',
    Site: r.Site,
    Time: r.Time,
    Depth: r.Depth,
    'Temp.': r['Temp.'],
    'Cond.': r['Cond.'],
    Salinity: r.Salinity,
    'DO mg/L': r['DO mg/L'],
    'DO%': r['DO%'],
    pH: r.pH,
    Turb: r.Turb,
    'Entero.': '',
    'Chl-A': ''
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, `YSI_Water_Quality_${formatDateMMDDYY(new Date()).replaceAll('/','-')}.xlsx`);
}

function bindEvents() {
  el('depthSelect').addEventListener('change', toggleDepth);
  el('ocrBtn').addEventListener('click', runOCR);
  el('clearBtn').addEventListener('click', () => {
    clearParsedValues(false);
    el('preview').removeAttribute('src');
    el('photo').value = '';
    currentImageDataUrl = '';
    setStatus('Form cleared.');
  });
  el('saveBtn').addEventListener('click', saveReading);
  el('exportBtn').addEventListener('click', exportExcel);
  el('reloadBtn').addEventListener('click', loadFromStorage);
  el('deleteLastBtn').addEventListener('click', () => {
    if (!savedReadings.length) return;
    savedReadings.pop();
    saveToStorage();
    renderTable();
  });
  el('resetAllBtn').addEventListener('click', () => {
    if (!confirm('Delete all saved readings from this device?')) return;
    savedReadings = [];
    saveToStorage();
    renderTable();
  });
  el('photo').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      currentImageDataUrl = evt.target.result;
      el('preview').src = currentImageDataUrl;
      setStatus('Photo loaded.');
    };
    reader.readAsDataURL(file);
  });
}

(function init() {
  populateSites();
  setTodayDefaults();
  toggleDepth();
  bindEvents();
  loadFromStorage();
})();
</script>
</body>
</html>
