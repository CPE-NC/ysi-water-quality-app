<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSI Water Quality Logger</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 15px; }
input, select, button { margin: 5px 0; padding: 8px; width: 100%; }
.preview { max-width: 100%; margin-top: 10px; }
.box { margin-top: 15px; padding: 10px; border: 1px solid #ccc; }
textarea { width:100%; height:120px; }
</style>
</head>

<body>

<h2>YSI Logger</h2>

<label>Site</label>
<input id="site" placeholder="Enter site">

<label>Depth</label>
<select id="depthSelect" onchange="toggleDepthInput()">
<option value="0.1">0.1 ft</option>
<option value="custom">Custom</option>
</select>

<input id="customDepth" placeholder="Enter depth" style="display:none">

<input type="file" accept="image/*" onchange="loadImage(event)">
<img id="preview" class="preview"/>

<button onclick="runOCR()">Run OCR</button>

<div class="box">
<h3>Parsed Values</h3>

<input id="date" placeholder="Date">
<input id="time" placeholder="Time">
<input id="temp" placeholder="Temp">
<input id="cond" placeholder="Conductivity">
<input id="sal" placeholder="Salinity">
<input id="do_mg" placeholder="DO mg/L">
<input id="do_pct" placeholder="DO %">
<input id="ph" placeholder="pH">
<input id="turb" placeholder="Turb">

</div>

<div class="box">
<h3>Raw OCR Text</h3>
<textarea id="rawText"></textarea>
</div>

<button onclick="saveReading()">Save Reading</button>
<button onclick="exportExcel()">Export Excel</button>

<script>
let readings = [];
let imageData = null;

function toggleDepthInput(){
let val = document.getElementById("depthSelect").value;
document.getElementById("customDepth").style.display =
(val === "custom") ? "block" : "none";
}

function loadImage(e){
const file = e.target.files[0];
const reader = new FileReader();
reader.onload = function(){
document.getElementById("preview").src = reader.result;
imageData = reader.result;
};
reader.readAsDataURL(file);
}

async function runOCR(){
if(!imageData) return alert("Upload image first");

let result = await Tesseract.recognize(imageData, 'eng');
let text = result.data.text;
document.getElementById("rawText").value = text;

parseText(text);
}

function parseText(text){

function find(regex){
let m = text.match(regex);
return m ? m[1] : "";
}

document.getElementById("temp").value = find(/(\d+\.\d)\s*°?C/);
document.getElementById("cond").value = find(/(\d+)\s*µS/);
document.getElementById("sal").value = find(/(\d+\.\d+)\s*S/);
document.getElementById("do_pct").value = find(/(\d+\.\d)\s*%/);
document.getElementById("do_mg").value = find(/(\d+\.\d+)\s*mg/);
document.getElementById("ph").value = find(/(\d+\.\d)\s*pH/);
document.getElementById("turb").value = find(/(\d+\.\d+)\s*NTU/);

let dt = text.match(/(\d{2}\/\d{2}\/\d{2}).*(\d{1,2}:\d{2}:\d{2})/);
if(dt){
document.getElementById("date").value = dt[1];
document.getElementById("time").value = dt[2];
}
}

function getDepth(){
let d = document.getElementById("depthSelect").value;
return d === "custom" ? document.getElementById("customDepth").value : d;
}

function saveReading(){
let r = {
site: document.getElementById("site").value,
depth: getDepth(),
date: document.getElementById("date").value,
time: document.getElementById("time").value,
temp: document.getElementById("temp").value,
cond: document.getElementById("cond").value,
sal: document.getElementById("sal").value,
do_mg: document.getElementById("do_mg").value,
do_pct: document.getElementById("do_pct").value,
ph: document.getElementById("ph").value,
turb: document.getElementById("turb").value
};

readings.push(r);
alert("Saved");
}

function exportExcel(){
let ws = XLSX.utils.json_to_sheet(readings);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Data");
XLSX.writeFile(wb, "YSI_Data.xlsx");
}
</script>

</body>
</html>
